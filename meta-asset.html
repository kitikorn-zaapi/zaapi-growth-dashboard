<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zaapi · Meta Asset</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #ffffff;
      --bg-subtle: #f7f7f5;
      --bg-card: #ffffff;
      --border: #e8e6e1;
      --border-strong: #d0cec8;
      --text: #1a1916;
      --text-muted: #7a786f;
      --text-faint: #b0ada5;
      --accent: #0f9e75;
      --up: #1a7a4a;
      --up-bg: #e8f7ee;
      --down: #c0392b;
      --down-bg: #fdecea;
      --font-sans: 'DM Sans', system-ui, sans-serif;
      --font-mono: 'DM Mono', 'Courier New', monospace;
    }

    html { font-size: 15px; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-sans);
      font-weight: 400;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    .page {
      max-width: 1100px;
      margin: 0 auto;
      padding: 3rem 2rem 5rem;
    }

    .header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 1rem;
      margin-bottom: 2rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid var(--border);
    }

    .logo {
      font-family: var(--font-mono);
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 0.35rem;
    }

    #week-label {
      font-size: 0.8rem;
      color: var(--text-faint);
      font-family: var(--font-mono);
    }

    .forex-ctrl {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.78rem;
      color: var(--text-muted);
    }

    .forex-ctrl input {
      width: 52px;
      padding: 4px 8px;
      font-size: 0.78rem;
      font-family: var(--font-mono);
      border: 1px solid var(--border-strong);
      border-radius: 5px;
      background: var(--bg-subtle);
      color: var(--text);
      text-align: center;
    }

    .forex-ctrl input:focus {
      outline: 2px solid var(--accent);
      outline-offset: 1px;
    }

    .nav-btn {
      font-family: var(--font-mono);
      font-size: 0.72rem;
      color: var(--text-muted);
      text-decoration: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 5px 10px;
      background: var(--bg-subtle);
    }

    .nav-btn:hover { color: var(--text); border-color: var(--border-strong); background: var(--bg); }
    .nav-btn.active { background: var(--text); color: var(--bg); border-color: var(--text); }

    .section { margin-top: 2.2rem; }

    .section-title {
      font-family: var(--font-mono);
      font-size: 0.74rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-faint);
      margin-bottom: 0.85rem;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.8rem 1rem;
      margin-bottom: 1rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--bg-subtle);
      padding: 0.8rem 1rem;
    }

    .control-group {
      display: flex;
      gap: 0.5rem;
      align-items: center;
    }

    .label {
      font-size: 0.72rem;
      font-family: var(--font-mono);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-faint);
    }

    select {
      border: 1px solid var(--border-strong);
      border-radius: 6px;
      background: var(--bg);
      color: var(--text);
      padding: 0.35rem 0.5rem;
      font-size: 0.86rem;
      font-family: var(--font-sans);
    }

    .leaderboard {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(295px, 1fr));
      gap: 0.8rem;
    }

    .asset-card {
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--bg-card);
      padding: 0.8rem;
    }

    .thumb-wrap {
      width: 100%;
      aspect-ratio: 1.25;
      border-radius: 6px;
      border: 1px solid var(--border);
      overflow: hidden;
      background: #efefef;
      margin-bottom: 0.7rem;
    }

    .thumb-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; }

    .img-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #d9d9d9;
      color: #555;
      font-family: var(--font-mono);
      font-size: 0.82rem;
      font-weight: 500;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      text-align: center;
      padding: 0.4rem;
    }

    .row-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.5rem;
      margin-bottom: 0.45rem;
    }

    .ad-code {
      font-family: var(--font-mono);
      font-size: 0.86rem;
      font-weight: 700;
      letter-spacing: 0.03em;
    }

    .pills { display: flex; flex-wrap: wrap; gap: 0.35rem; margin-bottom: 0.5rem; }

    .pill {
      font-size: 0.67rem;
      padding: 0.12rem 0.45rem;
      border-radius: 999px;
      border: 1px solid var(--border-strong);
      background: var(--bg-subtle);
      color: var(--text-muted);
      font-family: var(--font-mono);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .metrics {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 0.35rem 0.6rem;
      margin-bottom: 0.6rem;
    }

    .metric-label { font-size: 0.68rem; color: var(--text-faint); font-family: var(--font-mono); }
    .metric-value { font-size: 0.9rem; font-weight: 500; }

    .status {
      font-size: 0.68rem;
      font-family: var(--font-mono);
      text-transform: uppercase;
      letter-spacing: 0.04em;
      border-radius: 999px;
      padding: 0.12rem 0.5rem;
      border: 1px solid var(--border-strong);
      color: var(--text-muted);
      background: var(--bg-subtle);
    }

    .status-kill { color: var(--down); background: var(--down-bg); border-color: #f0b2ab; }
    .status-scale { color: var(--up); background: var(--up-bg); border-color: #b6e4c8; }

    .assessment {
      font-size: 0.8rem;
      color: var(--text-muted);
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      cursor: pointer;
      user-select: none;
    }

    .assessment.expanded {
      display: block;
      -webkit-line-clamp: unset;
      overflow: visible;
    }

    .table-wrap {
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }

    table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    thead { background: var(--bg-subtle); }
    th, td { padding: 0.6rem 0.75rem; text-align: left; border-bottom: 1px solid var(--border); }
    th { font-family: var(--font-mono); font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-faint); }
    tbody tr:last-child td { border-bottom: none; }

    .next-box {
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--bg-subtle);
      padding: 1rem;
      font-size: 0.95rem;
    }

    .empty {
      border: 1px dashed var(--border-strong);
      border-radius: 8px;
      padding: 0.9rem;
      color: var(--text-muted);
      background: #fcfcfb;
    }

    @media (max-width: 920px) {
      .header { flex-direction: column; }
    }
  </style>
</head>
<body>
  <main class="page">
    <header class="header">
      <div>
        <div class="logo">Zaapi · Growth Dashboard</div>
        <div id="week-label">—</div>
      </div>
      <div style="display:flex; align-items:center; gap:0.75rem; flex-wrap:wrap;">
        <div class="forex-ctrl">
          <span>Forex</span>
          <input id="forex-rate" type="number" step="0.01" min="0" aria-label="Forex rate" />
        </div>
        <a class="nav-btn" href="index.html">Overview</a>
        <a class="nav-btn" href="search.html">Search</a>
        <a class="nav-btn active" href="meta-asset.html" aria-current="page">Meta Asset</a>
      </div>
    </header>

    <section class="controls" aria-label="Meta asset controls">
      <div class="control-group">
        <label class="label" for="region-filter">Region</label>
        <select id="region-filter">
          <option value="All">All</option>
          <option value="TH">TH</option>
          <option value="SEA">SEA</option>
          <option value="ROW">ROW</option>
        </select>
      </div>
      <div class="control-group">
        <label class="label" for="sort-by">Sort</label>
        <select id="sort-by">
          <option value="fti_desc">FTI (descending)</option>
          <option value="hook_rate_desc">Hook Rate (descending)</option>
          <option value="spend_desc">Spend (descending)</option>
          <option value="cpa_asc">CPA (ascending)</option>
        </select>
      </div>
    </section>

    <section class="section">
      <h2 class="section-title">Section 1 — Leaderboard</h2>
      <div id="leaderboard" class="leaderboard"></div>
    </section>

    <section class="section">
      <h2 class="section-title">Section 2 — Fatigue Watch</h2>
      <div id="fatigue"></div>
    </section>

    <section class="section">
      <h2 class="section-title">Section 3 — Next Test Suggestion</h2>
      <div id="next-test" class="next-box"></div>
    </section>
  </main>

  <script src="meta-asset.js"></script>
</body>
</html>
