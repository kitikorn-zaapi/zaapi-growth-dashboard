<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zaapi · Meta Asset Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #ffffff;
      --bg-subtle: #f7f7f5;
      --bg-card: #ffffff;
      --border: #e8e6e1;
      --border-strong: #d0cec8;
      --text: #1a1916;
      --text-muted: #7a786f;
      --text-faint: #b0ada5;
      --accent: #0f9e75;
      --accent-bg: #e6f7f1;
      --up: #1a7a4a;
      --up-bg: #e8f7ee;
      --down: #c0392b;
      --down-bg: #fdecea;
      --font-sans: 'DM Sans', system-ui, sans-serif;
      --font-mono: 'DM Mono', 'Courier New', monospace;
    }

    html { font-size: 15px; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-sans);
      font-weight: 400;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    .page {
      max-width: 1100px;
      margin: 0 auto;
      padding: 3rem 2rem 5rem;
    }

    .header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 1rem;
      margin-bottom: 2rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid var(--border);
    }

    .logo {
      font-family: var(--font-mono);
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 0.35rem;
    }

    #week-label {
      font-size: 0.8rem;
      color: var(--text-faint);
      font-family: var(--font-mono);
    }

    .nav-btn {
      font-family: var(--font-mono);
      font-size: 0.72rem;
      color: var(--text-muted);
      text-decoration: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 5px 10px;
      background: var(--bg-subtle);
    }

    .nav-btn:hover { color: var(--text); border-color: var(--border-strong); background: var(--bg); }
    .nav-btn.active { background: var(--text); color: var(--bg); border-color: var(--text); }

    .controls {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      flex-wrap: wrap;
      margin-bottom: 1.5rem;
      padding: 1rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--bg-subtle);
    }

    .control-group {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      flex-wrap: wrap;
    }

    .label {
      font-size: 0.75rem;
      font-family: var(--font-mono);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-faint);
    }

    select {
      border: 1px solid var(--border-strong);
      border-radius: 6px;
      background: var(--bg);
      color: var(--text);
      padding: 0.4rem 0.55rem;
      font-size: 0.86rem;
      font-family: var(--font-sans);
    }

    .section { margin-top: 2rem; }
    .section-title {
      font-family: var(--font-mono);
      font-size: 0.74rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-faint);
      margin-bottom: 0.8rem;
    }

    .leaderboard {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(295px, 1fr));
      gap: 0.8rem;
    }

    .asset-card {
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--bg-card);
      padding: 0.8rem;
    }

    .thumb-wrap {
      width: 100%;
      aspect-ratio: 1.25;
      border-radius: 6px;
      border: 1px solid var(--border);
      overflow: hidden;
      background: #efefef;
      margin-bottom: 0.7rem;
    }

    .thumb-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .img-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #d9d9d9;
      color: #555;
      font-family: var(--font-mono);
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      text-align: center;
      padding: 0.4rem;
    }

    .row-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.5rem;
      margin-bottom: 0.45rem;
    }

    .ad-code {
      font-family: var(--font-mono);
      font-size: 0.84rem;
      font-weight: 500;
      letter-spacing: 0.04em;
    }

    .pills { display: flex; flex-wrap: wrap; gap: 0.35rem; margin-bottom: 0.45rem; }

    .pill {
      font-size: 0.68rem;
      padding: 0.12rem 0.45rem;
      border-radius: 999px;
      border: 1px solid var(--border-strong);
      background: var(--bg-subtle);
      color: var(--text-muted);
      font-family: var(--font-mono);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .metrics {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 0.35rem 0.6rem;
      margin-bottom: 0.6rem;
    }

    .metric-label { font-size: 0.68rem; color: var(--text-faint); font-family: var(--font-mono); }
    .metric-value { font-size: 0.9rem; font-weight: 500; }

    .status {
      font-size: 0.67rem;
      font-family: var(--font-mono);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      border-radius: 999px;
      padding: 0.15rem 0.5rem;
      border: 1px solid var(--border);
      color: var(--text-muted);
      background: var(--bg-subtle);
    }

    .status-kill { color: var(--down); background: var(--down-bg); border-color: #f1c3bc; }
    .status-scale { color: var(--up); background: var(--up-bg); border-color: #bbe4c8; }
    .status-watch { color: #8a6200; background: #fff8e7; border-color: #f1deaa; }
    .status-pending { color: #4e63a6; background: #eef2ff; border-color: #ccd5f7; }

    .assessment {
      margin-top: 0.4rem;
      font-size: 0.83rem;
      color: var(--text-muted);
      cursor: pointer;
      user-select: none;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .assessment.expanded {
      -webkit-line-clamp: unset;
      overflow: visible;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      font-size: 0.88rem;
    }

    th, td {
      text-align: left;
      padding: 0.52rem 0.6rem;
      border-bottom: 1px solid var(--border);
    }

    th {
      font-family: var(--font-mono);
      font-size: 0.68rem;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--text-faint);
      background: var(--bg-subtle);
    }

    tr:last-child td { border-bottom: none; }

    .next-test {
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.9rem;
      background: var(--bg-subtle);
      font-size: 0.95rem;
    }

    .empty {
      padding: 1rem;
      border: 1px dashed var(--border-strong);
      border-radius: 8px;
      color: var(--text-faint);
      font-family: var(--font-mono);
      font-size: 0.82rem;
    }

    @media (max-width: 760px) {
      .page { padding: 1.5rem 1rem 3rem; }
      .header { flex-direction: column; align-items: flex-start; margin-bottom: 1.2rem; }
      .metrics { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
  </style>
</head>
<body>
  <div class="page">
    <header class="header">
      <div>
        <div class="logo">Zaapi · Growth Dashboard</div>
        <div id="week-label">Meta Asset Performance</div>
      </div>
      <nav style="display:flex;align-items:center;gap:0.4rem;">
        <a href="index.html" class="nav-btn">Overview</a>
        <a href="search.html" class="nav-btn">Search</a>
        <a href="meta-asset.html" class="nav-btn active">Meta Asset</a>
      </nav>
    </header>

    <section class="controls">
      <div class="control-group">
        <label class="label" for="region-filter">Region</label>
        <select id="region-filter">
          <option value="All">All</option>
          <option value="TH">TH</option>
          <option value="SEA">SEA</option>
          <option value="ROW">ROW</option>
        </select>
      </div>
      <div class="control-group">
        <label class="label" for="sort-by">Sort</label>
        <select id="sort-by">
          <option value="fti_desc">FTI (desc)</option>
          <option value="hook_rate_desc">Hook Rate (desc)</option>
          <option value="spend_desc">Spend (desc)</option>
          <option value="cpa_asc">CPA (asc)</option>
        </select>
      </div>
    </section>

    <section class="section">
      <h2 class="section-title">Section 1 — Leaderboard</h2>
      <div id="leaderboard" class="leaderboard"></div>
    </section>

    <section class="section">
      <h2 class="section-title">Section 2 — Fatigue</h2>
      <div id="fatigue"></div>
    </section>

    <section class="section">
      <h2 class="section-title">Section 3 — Next Test</h2>
      <div id="next-test" class="next-test"></div>
    </section>
  </div>

  <script src="meta-asset.js"></script>
</body>
</html>
