<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zaapi · Weekly Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />

  <style>
    /* ── Reset & base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #ffffff;
      --bg-subtle: #f7f7f5;
      --bg-card:   #ffffff;
      --border:    #e8e6e1;
      --border-strong: #d0cec8;
      --text:      #1a1916;
      --text-muted:#7a786f;
      --text-faint:#b0ada5;
      --accent:    #0f9e75;
      --accent-bg: #e6f7f1;
      --up:        #1a7a4a;
      --up-bg:     #e8f7ee;
      --down:      #c0392b;
      --down-bg:   #fdecea;
      --warn:      #9a6200;
      --warn-bg:   #fef3dc;
      --font-sans: 'DM Sans', system-ui, sans-serif;
      --font-mono: 'DM Mono', 'Courier New', monospace;
    }

    html { font-size: 15px; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-sans);
      font-weight: 400;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Layout ── */
    .page {
      max-width: 860px;
      margin: 0 auto;
      padding: 2.5rem 1.5rem 4rem;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 1rem;
      margin-bottom: 2.5rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid var(--border);
    }

    .header-left {}

    .logo {
      font-family: var(--font-mono);
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 0.35rem;
    }

    #week-label {
      font-size: 0.8rem;
      color: var(--text-faint);
      font-family: var(--font-mono);
    }

    .forex-ctrl {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.78rem;
      color: var(--text-muted);
    }

    .forex-ctrl input {
      width: 52px;
      padding: 4px 8px;
      font-size: 0.78rem;
      font-family: var(--font-mono);
      border: 1px solid var(--border-strong);
      border-radius: 5px;
      background: var(--bg-subtle);
      color: var(--text);
      text-align: center;
    }

    .forex-ctrl input:focus {
      outline: 2px solid var(--accent);
      outline-offset: 1px;
    }

    /* ── State badge ── */
    .state-row {
      margin-bottom: 2rem;
    }

    .state-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.45rem 1rem 0.45rem 0.75rem;
      border-radius: 6px;
      font-family: var(--font-mono);
      font-size: 0.8rem;
      font-weight: 500;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      border: 1px solid transparent;
    }

    .state-improving { background: var(--up-bg);   color: var(--up);   border-color: #b6e4c8; }
    .state-flat      { background: var(--bg-subtle); color: var(--text-muted); border-color: var(--border-strong); }
    .state-blocked   { background: var(--down-bg); color: var(--down); border-color: #f5c0bb; }

    .state-icon {
      font-size: 1rem;
      line-height: 1;
    }

    /* ── Section titles ── */
    .section { margin-bottom: 2.5rem; }

    .section-title {
      font-family: var(--font-mono);
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-faint);
      margin-bottom: 0.85rem;
    }

    /* ── Snapshot cards ── */
    #snapshot-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 0;
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }

    .card {
      padding: 1.1rem 1.2rem;
      background: var(--bg-card);
      border-right: 1px solid var(--border);
    }

    .card:last-child { border-right: none; }

    .card-label {
      font-size: 0.72rem;
      font-family: var(--font-mono);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-faint);
      margin-bottom: 0.3rem;
    }

    .card-value {
      font-size: 1.65rem;
      font-weight: 300;
      line-height: 1.1;
      color: var(--text);
      margin-bottom: 0.35rem;
    }

    .card-row {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      margin-bottom: 0.25rem;
    }

    .card-sub {
      font-size: 0.75rem;
      color: var(--text-faint);
    }

    .card-note {
      font-size: 0.7rem;
      color: var(--text-faint);
      margin-top: 0.25rem;
    }

    /* ── WoW pill ── */
    .wow {
      display: inline-block;
      font-size: 0.68rem;
      font-family: var(--font-mono);
      font-weight: 500;
      padding: 1px 5px;
      border-radius: 3px;
    }

    .wow.up      { background: var(--up-bg);   color: var(--up); }
    .wow.down    { background: var(--down-bg); color: var(--down); }
    .wow.neutral { background: var(--bg-subtle); color: var(--text-muted); }

    /* ── Tables ── */
    .table-wrap {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.82rem;
    }

    thead th {
      font-family: var(--font-mono);
      font-size: 0.68rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-faint);
      text-align: left;
      padding: 0 0.75rem 0.6rem;
      border-bottom: 1px solid var(--border);
    }

    thead th.num-col { text-align: right; }

    tbody tr:hover { background: var(--bg-subtle); }

    tbody td {
      padding: 0.6rem 0.75rem;
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
    }

    tbody tr:last-child td { border-bottom: none; }

    .metric-col { color: var(--text-muted); font-size: 0.8rem; }
    .metric-col strong { color: var(--text); }

    .num-col {
      text-align: right;
      font-family: var(--font-mono);
      font-size: 0.8rem;
      white-space: nowrap;
    }

    .muted { color: var(--text-faint); }

    .tag-high {
      display: inline-block;
      font-family: var(--font-mono);
      font-size: 0.68rem;
      padding: 1px 6px;
      border-radius: 3px;
      background: var(--up-bg);
      color: var(--up);
    }

    .tag-low {
      display: inline-block;
      font-family: var(--font-mono);
      font-size: 0.68rem;
      padding: 1px 6px;
      border-radius: 3px;
      background: var(--bg-subtle);
      color: var(--text-muted);
    }

    /* ── Insights ── */
    #insights-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }

    .insight-item {
      display: flex;
      align-items: baseline;
      gap: 0.75rem;
      font-size: 0.88rem;
      line-height: 1.55;
    }

    .insight-num {
      font-family: var(--font-mono);
      font-size: 0.68rem;
      font-weight: 500;
      color: var(--accent);
      min-width: 1rem;
      padding-top: 0.05rem;
    }

    /* ── Next step ── */
    .next-step-box {
      display: flex;
      align-items: center;
      gap: 0.85rem;
      padding: 0.9rem 1.1rem;
      background: var(--accent-bg);
      border: 1px solid #9de4c9;
      border-radius: 7px;
    }

    .next-step-arrow {
      font-size: 1rem;
      color: var(--accent);
      flex-shrink: 0;
    }

    #next-step-text {
      font-size: 0.85rem;
      color: #0b7a5a;
    }

    /* ── Divider ── */
    .divider {
      height: 1px;
      background: var(--border);
      margin: 2rem 0;
    }

    /* ── Responsive ── */
    @media (max-width: 620px) {
      #snapshot-grid {
        grid-template-columns: repeat(2, 1fr);
      }
      .card:nth-child(2) { border-right: none; }
      .card:nth-child(1),
      .card:nth-child(2) { border-bottom: 1px solid var(--border); }

      thead th:nth-child(3) { display: none; }
      tbody td:nth-child(3) { display: none; }
    }
  </style>
</head>
<body>
  <div class="page">

    <!-- Header -->
    <header class="header">
      <div class="header-left">
        <div class="logo">Zaapi · Growth Dashboard</div>
        <div id="week-label">loading…</div>
      </div>
      <div class="forex-ctrl">
        <input type="number" id="forex-rate" value="34" min="1" step="0.1" aria-label="THB per USD" />
        <span>THB = $1</span>
      </div>
    </header>

    <!-- 1 · State -->
    <div class="state-row">
      <div id="state-badge" class="state-badge state-flat">
        <span class="state-icon">→</span>
        <span id="state-label">Loading</span>
      </div>
    </div>

    <!-- 2 · Snapshot cards -->
    <div class="section">
      <div class="section-title">Snapshot</div>
      <div id="snapshot-grid"></div>
    </div>

    <!-- 3 · WoW table -->
    <div class="section">
      <div class="section-title">Week-on-week comparison</div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Metric</th>
              <th class="num-col">This week</th>
              <th class="num-col">Prev week</th>
              <th class="num-col">WoW</th>
            </tr>
          </thead>
          <tbody id="wow-tbody"></tbody>
        </table>
      </div>
    </div>

    <!-- Region breakdown -->
    <div class="section">
      <div class="section-title">Spend by region</div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Region</th>
              <th class="num-col">Total</th>
              <th class="num-col">Google</th>
              <th class="num-col">Meta</th>
              <th class="num-col">FTI</th>
              <th class="num-col">Lost IS rank</th>
            </tr>
          </thead>
          <tbody id="region-tbody"></tbody>
        </table>
      </div>
    </div>

    <div class="divider"></div>

    <!-- 4 · What's happening -->
    <div class="section">
      <div class="section-title">What's happening</div>
      <ul id="insights-list"></ul>
    </div>

    <!-- 5 · Where to look next -->
    <div class="section">
      <div class="section-title">Where to look next</div>
      <div class="next-step-box">
        <span class="next-step-arrow">→</span>
        <span id="next-step-text"></span>
      </div>
    </div>

  </div>

  <script src="app.js"></script>
</body>
</html>
